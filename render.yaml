previews:
  generation: automatic
  expireAfterDays: 7

services:
  # Production web API (Render dashboard name: BunkLogs → admin.bunklogs.net)
  - type: web
    name: BunkLogs
    runtime: python3
    previews:
      generation: automatic
    buildCommand: "./build.sh"
    healthCheckPath: "/health/"
    startCommand: "ddtrace-run gunicorn --config gunicorn.conf.py config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: WEB_CONCURRENCY
        value: "3"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.production"
      - key: DJANGO_SECRET_KEY
        fromSecret: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: clc-bunklogs-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bunklogs-redis
          property: connectionString
      - key: MAILGUN_API_KEY
        fromSecret: MAILGUN_API_KEY
      - key: MAILGUN_DOMAIN
        fromSecret: MAILGUN_DOMAIN
      - key: MAILGUN_FROM_EMAIL
        fromSecret: MAILGUN_FROM_EMAIL
      - key: DD_ENV
        value: prod
      - key: DD_SERVICE
        value: bunklogs-backend
      - key: DD_VERSION
        value: "1.0"
      - key: DD_LOGS_INJECTION
        value: "true"
      - key: DD_TRACE_ENABLED
        value: "true"
      # Private-network hostname from datadog-agent → Connect tab (not the dashboard name).
      - key: DD_AGENT_HOST
        value: "datadog-agent-fbsh"
      - key: DD_RUNTIME_METRICS_ENABLED
        value: "true"
      # Propagate trace context when API handlers enqueue Celery tasks.
      - key: DD_CELERY_DISTRIBUTED_TRACING
        value: "true"

  - type: web
    name: BunkLogs-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://admin.bunklogs.net
      - key: VITE_DATADOG_ENV
        value: prod
      - key: VITE_DATADOG_SERVICE
        value: bunklogs-frontend
      - key: VITE_DATADOG_SITE
        value: datadoghq.com
      - key: VITE_DATADOG_VERSION
        value: "1.0.0"
      - key: VITE_DATADOG_APPLICATION_ID
        fromSecret: VITE_DATADOG_APPLICATION_ID
      - key: VITE_DATADOG_CLIENT_TOKEN
        fromSecret: VITE_DATADOG_CLIENT_TOKEN
      - key: VITE_GOOGLE_CLIENT_ID
        fromSecret: VITE_GOOGLE_CLIENT_ID

  # Celery worker for translation pipeline and other async tasks
  - type: worker
    name: bunklogs-celery
    runtime: python3
    buildCommand: "./build.sh"
    startCommand: "ddtrace-run celery -A config worker -B -l info --concurrency=2"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.production"
      - key: DJANGO_SECRET_KEY
        fromSecret: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: clc-bunklogs-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bunklogs-redis
          property: connectionString
      - key: DD_ENV
        value: prod
      - key: DD_SERVICE
        value: bunklogs-celery
      - key: DD_VERSION
        value: "1.0"
      - key: DD_TRACE_ENABLED
        value: "true"
      - key: DD_LOGS_INJECTION
        value: "true"
      - key: DD_AGENT_HOST
        value: "datadog-agent-fbsh"
      - key: DD_RUNTIME_METRICS_ENABLED
        value: "true"
      # Continue traces from the web API into background task spans.
      - key: DD_CELERY_DISTRIBUTED_TRACING
        value: "true"

  # Cron job for daily email reports
  - type: cron
    name: daily-reports
    runtime: python3
    buildCommand: "./build.sh"
    schedule: "0 8 * * *"  # Daily at 8 AM
    startCommand: "ddtrace-run python manage.py send_daily_reports"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.production"
      - key: DJANGO_SECRET_KEY
        fromSecret: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: clc-bunklogs-postgres
          property: connectionString
      - key: MAILGUN_API_KEY
        fromSecret: MAILGUN_API_KEY
      - key: MAILGUN_DOMAIN
        fromSecret: MAILGUN_DOMAIN
      - key: MAILGUN_FROM_EMAIL
        fromSecret: MAILGUN_FROM_EMAIL
      - key: DD_ENV
        value: prod
      - key: DD_SERVICE
        value: bunklogs-daily-reports
      - key: DD_VERSION
        value: "1.0"
      - key: DD_TRACE_ENABLED
        value: "true"
      - key: DD_LOGS_INJECTION
        value: "true"
      - key: DD_AGENT_HOST
        value: "datadog-agent-fbsh"

  # Datadog Agent — private service (dashboard name: datadog-agent).
  # Internal hostname for DD_AGENT_HOST is on Connect tab (currently datadog-agent-fbsh).
  - type: pserv
    name: datadog-agent
    runtime: image
    plan: starter
    image:
      url: gcr.io/datadoghq/agent:7
    envVars:
      - key: DD_API_KEY
        fromSecret: DD_API_KEY
      - key: DD_SITE
        value: datadoghq.com
      - key: DD_APM_ENABLED
        value: "true"
      - key: DD_APM_NON_LOCAL_TRAFFIC
        value: "true"
      - key: DD_DOGSTATSD_NON_LOCAL_TRAFFIC
        value: "true"
      - key: DD_SYSTEM_PROBE_ENABLED
        value: "false"

  - type: redis
    name: bunklogs-redis
    plan: starter

databases:
  - name: clc-bunklogs-postgres
    plan: starter
    previewPlan: free
