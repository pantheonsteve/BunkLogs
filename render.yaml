previews:
  generation: automatic
  expireAfterDays: 7

services:
  - type: web
    name: bunklogs-backend
    runtime: python3
    previews:
      generation: automatic
    buildCommand: "./build.sh"
    healthCheckPath: "/health/"
    startCommand: "ddtrace-run gunicorn --config gunicorn.conf.py config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.production"
      - key: DJANGO_SECRET_KEY
        fromSecret: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: bunklogs-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bunklogs-redis
          property: connectionString
      - key: MAILGUN_API_KEY
        fromSecret: MAILGUN_API_KEY
      - key: MAILGUN_DOMAIN
        fromSecret: MAILGUN_DOMAIN
      - key: MAILGUN_FROM_EMAIL
        fromSecret: MAILGUN_FROM_EMAIL
      # --- Datadog: service tagging (existing) ---
      - key: DD_ENV
        value: prod
      - key: DD_SERVICE
        value: bunklogs-backend
      - key: DD_VERSION
        value: "1.0"
      - key: DD_LOGS_INJECTION
        value: "true"
      - key: DD_TRACE_ENABLED
        value: "true"
      # --- Datadog: point tracer + statsd at the Agent over the private network (NEW) ---
      - key: DD_AGENT_HOST
        value: "datadog-agent-fbsh"
      - key: DD_RUNTIME_METRICS_ENABLED
        value: "true"

  # Cron job for daily email reports
  - type: cron
    name: daily-reports
    runtime: python3
    buildCommand: "./build.sh"
    schedule: "0 8 * * *"  # Daily at 8 AM
    startCommand: "ddtrace-run python manage.py send_daily_reports"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.production"
      - key: DJANGO_SECRET_KEY
        fromSecret: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: bunklogs-db
          property: connectionString
      - key: MAILGUN_API_KEY
        fromSecret: MAILGUN_API_KEY
      - key: MAILGUN_DOMAIN
        fromSecret: MAILGUN_DOMAIN
      - key: MAILGUN_FROM_EMAIL
        fromSecret: MAILGUN_FROM_EMAIL
      # --- Datadog (NEW) ---
      - key: DD_ENV
        value: prod
      - key: DD_SERVICE
        value: bunklogs-daily-reports   # or "bunklogs-backend" to group it with the web app in APM
      - key: DD_VERSION
        value: "1.0"
      - key: DD_TRACE_ENABLED
        value: "true"
      - key: DD_LOGS_INJECTION
        value: "true"
      - key: DD_AGENT_HOST
        value: "datadog-agent-fbsh"

  - type: redis
    name: bunklogs-redis
    plan: starter

databases:
  - name: bunklogs-db
    plan: starter
    previewPlan: free